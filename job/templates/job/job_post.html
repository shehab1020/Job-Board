{% extends 'base.html' %}

{% load bootstrap5 %}

{% block body %}


    <!-- bradcam_area  -->
    <div class="bradcam_area bradcam_bg_1">
        <div class="container">
            <div class="row">
                <div class="col-xl-12">
                    <div class="bradcam_text">
                        <h3>Post a Job</h3>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <!--/ bradcam_area  -->

    <div class="job_details_area">
        <div class="container">
            <div class="row">
                <div class="col-lg-10 m-auto">
                    <div class="apply_job_form white-bg">
                        <h4>Post a Job</h4>
                        <form method="post" enctype="multipart/form-data">
                            {% csrf_token %}
                            {% bootstrap_form form %}
                            <button class="boxed-btn3 w-100" type="submit">Apply Now</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
{% endblock body %}
